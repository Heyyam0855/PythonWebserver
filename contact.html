<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Əlaqə - Python Web Server</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        h1 {
            color: #f5576c;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #f5576c;
        }
        
        textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        
        .submit-btn:hover {
            transform: scale(1.05);
        }
        
        .contact-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
            text-align: center;
        }
        
        .contact-info h3 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .contact-item {
            margin: 10px 0;
            color: #666;
        }
        
        .back-button {
            display: inline-block;
            background: #f5576c;
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            margin-top: 20px;
            transition: transform 0.3s ease;
        }
        
        .back-button:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📧 Əlaqə</h1>
        
        <form id="contactForm" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label for="name">👤 Adınız:</label>
                <input type="text" id="name" name="name" required placeholder="Adınızı daxil edin">
            </div>
            
            <div class="form-group">
                <label for="email">📧 Email:</label>
                <input type="email" id="email" name="email" required placeholder="email@example.com">
            </div>
            
            <div class="form-group">
                <label for="subject">📝 Mövzu:</label>
                <input type="text" id="subject" name="subject" required placeholder="Mesajın mövzusu">
            </div>
            
            <div class="form-group">
                <label for="message">💬 Mesaj:</label>
                <textarea id="message" name="message" required placeholder="Mesajınızı buraya yazın..."></textarea>
            </div>
            
            <button type="submit" class="submit-btn">🚀 Göndər</button>
        </form>
        
        <div class="contact-info">
            <h3>📞 Əlaqə Məlumatları</h3>
            <div class="contact-item">📧 Email: info@pythonserver.az</div>
            <div class="contact-item">📱 Telefon: +994 XX XXX XX XX</div>
            <div class="contact-item">🌐 Web: www.pythonserver.az</div>
            <div class="contact-item">📍 Ünvan: Bakı, Azərbaycan</div>
        </div>
        
        <div style="text-align: center;">
            <a href="/" class="back-button">⬅️ Ana səhifəyə qayıt</a>
        </div>
    </div>
    
    <script>
        function handleSubmit(event) {
            event.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const subject = document.getElementById('subject').value;
            const message = document.getElementById('message').value;
            
            alert(`✅ Təşəkkürlər ${name}!\n\nMesajınız uğurla göndərildi.\n\nTezliklə sizinlə əlaqə saxlayacağıq.`);
            
            document.getElementById('contactForm').reset();
        }
    </script>
</body>
</html>
